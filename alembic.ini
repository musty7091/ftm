[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# FTM artık runtime config üzerinden SQLite local desktop modunda çalışır.
# Gerçek veritabanı bağlantı adresi migrations/env.py içinde settings.database_url
# üzerinden otomatik set edilir.
#
# Bu satır yalnızca Alembic'in varsayılan placeholder ihtiyacı için tutulur.
# Üretim/kurulum bağlantı bilgisi değildir.
sqlalchemy.url = sqlite:///./ftm_placeholder.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S